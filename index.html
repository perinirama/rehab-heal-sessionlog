<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rehab & Heal — Session Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FCF5F1;
      --blush: #F5ECE6;
      --white: #FFFFFF;
      --dark: #000000;
      --mid: #000000;
      --accent: #000000;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      background: var(--cream);
    }

    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(44,36,32,0.08);
      text-align: center;
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      background: var(--dark);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      padding: 14px;
    }

    .logo-wrap svg {
      width: 100%;
      height: 100%;
    }

    .login-title {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--mid);
      font-weight: 300;
      margin-bottom: 36px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--blush);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      background: var(--cream);
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .input-group input:focus {
      border-color: var(--accent);
    }

    .input-group input::placeholder {
      color: var(--mid);
      opacity: 0.7;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .login-btn:active { transform: scale(0.98); opacity: 0.85; }

    .login-error {
      margin-top: 14px;
      font-size: 13px;
      color: #b05050;
      display: none;
    }

    /* ── MAIN APP ── */
    #app-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .app-header {
      background: var(--dark);
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .refresh-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .refresh-btn:active { opacity: 0.5; }

    .refresh-btn svg {
      color: rgba(255,255,255,0.65);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    /* Search */
    .search-wrap {
      padding: 20px 20px 12px;
      background: var(--cream);
      position: sticky;
      top: 74px;
      z-index: 9;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 15px 20px 15px 48px;
      border: 1.5px solid var(--blush);
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      background: var(--white);
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      box-shadow: 0 2px 12px rgba(44,36,32,0.05);
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 2px 20px rgba(196,169,154,0.2);
    }

    .search-box input::placeholder { color: var(--mid); opacity: 0.7; }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      pointer-events: none;
    }

    .results-count {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 4px 0;
      font-weight: 300;
    }

    .last-updated {
      font-size: 10px;
      color: var(--mid);
      opacity: 0.5;
      padding: 4px 4px 0;
      font-weight: 300;
    }

    /* Client list */
    .client-list {
      padding: 8px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .client-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(44,36,32,0.05);
      border: 1.5px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .client-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 6px rgba(44,36,32,0.08);
    }

    .client-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(196,169,154,0.15);
    }

    .client-info { flex: 1; }

    .client-name {
      font-family: 'Inter', sans-serif;
      font-size: 19px;
      font-weight: 500;
      color: var(--dark);
      letter-spacing: 0.01em;
      margin-bottom: 2px;
    }

    .client-email {
      font-size: 12px;
      color: var(--mid);
      font-weight: 300;
    }

    .open-btn {
      width: 38px;
      height: 38px;
      background: var(--cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .open-btn svg {
      color: var(--dark);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }

    .empty-state p {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      color: var(--mid);
      font-weight: 400;
    }

    .empty-state span {
      font-size: 13px;
      color: var(--accent);
      font-weight: 300;
      display: block;
      margin-top: 6px;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
    }

    .loading-state p {
      font-size: 13px;
      color: var(--mid);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--blush);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade in animation */
    .client-card {
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <svg class="header-logo" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">

<script>
  // ── CONFIGURATION ──────────────────────────────────────────────
  // IMPORTANT: Replace these values before deploying

  const PASSWORD = '1982'; // Change this to your desired password

  // Google Sheets published CSV URL
  // Instructions to get this URL:
  // 1. Open the spreadsheet
  // 2. Go to File → Share → Publish to web
  // 3. Select the "Client directory" sheet
  // 4. Select "Comma-separated values (.csv)"
  // 5. Click Publish and copy the URL
  // 6. Paste it below replacing the placeholder
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYzb7uXCvn75TjVXtFQOPT927Uacw6Djy2zCqsp4FkT2R5gXAwJszFk7KlF3ObwDYZ/exec';
  const CACHE_KEY = 'rh_clients_cache';

  function fetchClientsJSONP() {
    return new Promise((resolve, reject) => {
      const callbackName = 'rhCallback_' + Date.now();
      const script = document.createElement('script');
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Timeout'));
      }, 10000);

      window[callbackName] = function(data) {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.src = SCRIPT_URL + '?callback=' + callbackName;
      script.onerror = () => { cleanup(); console.error('JSONP script load error'); reject(new Error('Script error')); };
      document.head.appendChild(script);
    });
  }

  // ── AUTH ────────────────────────────────────────────────────────
  function checkPassword() {
    const input = document.getElementById('password-input').value;
    const error = document.getElementById('login-error');
    if (input === PASSWORD) {
      sessionStorage.setItem('rh_auth', '1');
      showApp();
    } else {
      error.style.display = 'block';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app-screen');
    app.style.display = 'flex';
    loadClients();
    startAutoRefresh();
  }

  // Check if already authenticated this session
  document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('rh_auth') === '1') showApp();
  });

  // ── DATA ────────────────────────────────────────────────────────
  let allClients = [];

  async function loadClients(attempt = 1) {
    // Load from cache immediately
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        allClients = JSON.parse(cached);
        document.getElementById('loading-state').style.display = 'none';
        renderClients(allClients);
        updateLastUpdated();
      } catch(e) {}
    }

    // Fetch fresh data via JSONP
    try {
      const data = await fetchClientsJSONP();
      allClients = data.filter(c => c.name && c.link);
      localStorage.setItem(CACHE_KEY, JSON.stringify(allClients));
      document.getElementById('loading-state').style.display = 'none';
      renderClients(allClients);
      updateLastUpdated();
    } catch (err) {
      console.error('JSONP error:', err.message);
      if (!cached) {
        if (attempt < 3) {
          setTimeout(() => loadClients(attempt + 1), attempt * 2000);
        } else {
          document.getElementById('loading-state').innerHTML = '<p style="color:#b05050">Could not load clients: ' + err.message + '</p>';
        }
      }
    }
  }

  function parseCSVRow(row) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
      const char = row[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current);
    return result;
  }

  function renderClients(clients) {
    const list = document.getElementById('client-list');
    const loading = document.getElementById('loading-state');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('results-count');

    // Clear previous cards (keep loading div)
    Array.from(list.querySelectorAll('.client-card')).forEach(el => el.remove());

    if (clients.length === 0) {
      empty.style.display = 'block';
      count.textContent = '';
      return;
    }

    empty.style.display = 'none';
    count.textContent = `${clients.length} client${clients.length !== 1 ? 's' : ''}`;

    clients.forEach((client, i) => {
      const card = document.createElement('a');
      card.className = 'client-card';
      card.href = client.link;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.animationDelay = `${i * 30}ms`;
      card.innerHTML = `
        <div class="client-info">
          <div class="client-name">${escapeHtml(client.name)}</div>
          ${client.email ? `<div class="client-email">${escapeHtml(client.email)}</div>` : ''}
          ${client.phone ? `<div class="client-email">${escapeHtml(client.phone)}</div>` : ''}
        </div>
        <div class="open-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
          </svg>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── REFRESH ─────────────────────────────────────────────────────
  let autoRefreshTimer = null;

  async function refreshClients(silent = false) {
    const btn = document.getElementById('refresh-btn');
    if (btn) btn.classList.add('spinning');
    try {
      const data = await fetchClientsJSONP();
      allClients = data.filter(c => c.name && c.link);
      localStorage.setItem(CACHE_KEY, JSON.stringify(allClients));
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      if (query) {
        renderClients(allClients.filter(c => c.name.toLowerCase().includes(query)));
      } else {
        renderClients(allClients);
      }
      updateLastUpdated();
    } catch (err) {
      if (!silent) alert('Could not refresh. Please check your connection.');
    } finally {
      if (btn) btn.classList.remove('spinning');
    }
  }

  function updateLastUpdated() {
    const el = document.getElementById('last-updated');
    if (!el) return;
    const now = new Date();
    const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    el.textContent = `Last updated ${time}`;
  }

  function manualRefresh() {
    refreshClients(false);
  }

  function startAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => refreshClients(true), 2 * 60 * 1000); // every 2 minutes
  }

  // ── SEARCH ──────────────────────────────────────────────────────
  document.getElementById('search-input').addEventListener('input', function () {
    const query = this.value.toLowerCase().trim();
    if (!query) {
      renderClients(allClients);
      return;
    }
    const filtered = allClients.filter(c =>
      c.name.toLowerCase().includes(query)
    );
    renderClients(filtered);
  });
</script>
</body>
</html>
